# Deploy production when `main` is pushed (backup if Vercel ↔ GitHub webhooks fail).
#
# One-time setup (GitHub repo → Settings → Secrets and variables → Actions):
#   1. VERCEL_TOKEN — https://vercel.com/account/tokens
#   2. VERCEL_ORG_ID, VERCEL_PROJECT_ID — run `vercel link` locally, read `.vercel/project.json`
#
# Optional: Vercel → Project → Settings → Git → disable "Automatic deployments from Git"
# if you want ONLY this workflow (avoids double deploys).
name: Vercel Production
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment (production)
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
